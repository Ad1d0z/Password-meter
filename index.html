<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Meter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="card">
        <button id="themeToggle" type="button" aria-label="Toggle dark mode">🌙</button>
        <h1>Password Meter 🔐</h1>

        <label for="passwordInput">Enter password</label>
        <input type="password" id="passwordInput" placeholder="Type a password…">

        <label class="show-toggle">
          <input type="checkbox" id="showPassword"> Show password
        </label>

        <div class="meter">
            <div id="barContainer">
                <div class="segment"></div>
                <div class="segment"></div>
                <div class="segment"></div>
                <div class="segment"></div>
                <div class="segment"></div>
                <div class="segment"></div>
            </div>
            <span id="label" class="badge"></span>
        </div>

        <p id="score" class="score">Score: 0 / 6</p>

        <ul class="checklist">
            <li id="length" class="check">Length: 0</li>
            <li id="LowerCase" class="check">Lowercase ✗</li>
            <li id="UpperCase" class="check">Uppercase ✗</li>
            <li id="Number" class="check">Number ✗</li>
            <li id="Symbol" class="check">Symbol ✗</li>
        </ul>

        <p id="warning"></p>
    </main>

    <script src="app.js"></script>
</body>
</html>
